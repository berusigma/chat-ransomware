<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Ruang Gelap</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; height: 100dvh; display: flex; justify-content: center; align-items: center; background: #111; overflow: hidden; font-family: 'Special Elite', monospace; color: #d32f2f; touch-action: pan-y; }
        .window-3x4 { width: 100%; max-width: 400px; height: 90dvh; max-height: 533px; aspect-ratio: 3 / 4; border: 2px solid #5a0000; box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); position: relative; display: flex; flex-direction: column; overflow: hidden; background: #000; }
        #bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.4) contrast(1.3) sepia(0.2); pointer-events: none; }
        #login-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 0, 0, 0.8); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; backdrop-filter: blur(2px); }
        #login-modal h2 { font-family: 'Creepster', cursive; font-size: 2rem; color: #ff1a1a; text-shadow: 0 0 10px #ff0000; margin-bottom: 30px; letter-spacing: 2px; }
        #login-modal input { width: 80%; padding: 12px; background: rgba(17, 17, 17, 0.8); border: 1px solid #770000; color: #ff3333; font-family: inherit; text-align: center; font-size: 1.1rem; outline: none; box-shadow: inset 0 0 10px #000; }
        #login-modal button { margin-top: 20px; padding: 10px 30px; background: #5a0000; color: #fff; border: 1px solid #ff1a1a; cursor: pointer; font-family: inherit; transition: 0.3s; box-shadow: 0 0 10px #ff0000; }
        #login-modal button:hover { background: #ff1a1a; color: #000; }
        #chat-ui { display: none; flex-direction: column; height: 100%; width: 100%; position: relative; z-index: 2; }
        .header { background: rgba(26, 0, 0, 0.85); padding: 15px; text-align: center; border-bottom: 2px solid #5a0000; font-family: 'Creepster', cursive; letter-spacing: 1px; font-size: 1.2rem; backdrop-filter: blur(1px); }
        #chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: rgba(0, 0, 0, 0.15); }
        #chat-box::-webkit-scrollbar { width: 5px; } #chat-box::-webkit-scrollbar-thumb { background: #770000; }
        .msg { padding: 10px 15px; border-radius: 8px; max-width: 85%; word-wrap: break-word; font-size: 0.9rem; position: relative; }
        .msg.me { background: rgba(48, 0, 0, 0.85); border: 1px solid #770000; align-self: flex-end; color: #ff9999; box-shadow: 0 3px 6px rgba(0,0,0,0.6); }
        .msg.admin { background: rgba(10, 10, 10, 0.9); border: 1px solid #444; align-self: flex-start; color: #bbb; border-left: 3px solid #ff1a1a; box-shadow: 0 3px 6px rgba(0,0,0,0.6); }
        form { display: flex; background: rgba(17, 17, 17, 0.9); border-top: 2px solid #5a0000; padding: 10px; }
        form input { flex-grow: 1; padding: 10px; background: transparent; border: none; color: #ff3333; font-family: inherit; outline: none; }
        form input::placeholder { color: #5a1111; }
        form button { background: transparent; color: #ff1a1a; border: none; cursor: pointer; font-weight: bold; padding: 0 10px; font-family: inherit; }
        form button:hover { text-shadow: 0 0 5px #ff1a1a; }
    </style>
</head>
<body>

<div class="window-3x4">
    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://scraper-ig.vercel.app/quality_restoration_20260625073907301.mp4" type="video/mp4">
    </video>

    <div id="login-modal">
        <h2>Siapa yang datang?</h2>
        <input type="text" id="username-input" placeholder="Sebutkan namamu..." autocomplete="off">
        <button onclick="enterRoom()">MASUK</button>
        <p id="error-msg" style="color: red; display: none; margin-top: 10px;">Nama tidak boleh kosong!</p>
    </div>

    <div id="chat-ui">
        <div class="header">Menghubungi Admin... <span id="user-display" style="font-size:0.8em; color:#888;"></span></div>
        <div id="chat-box"></div>
        <form id="chat-form">
            <input type="text" id="msg-input" placeholder="Bisikkan sesuatu..." required autocomplete="off">
            <button type="submit">KIRIM</button>
        </form>
    </div>
</div>

<script>
    const loginModal = document.getElementById('login-modal');
    const chatUi = document.getElementById('chat-ui');
    const errorMsg = document.getElementById('error-msg');
    let username = localStorage.getItem('chat_username');

    if (username) showChat();

    async function enterRoom() {
        const inputName = document.getElementById('username-input').value.trim();
        if (inputName) {
            localStorage.setItem('chat_username', inputName);
            username = inputName;
            
            // Panggil API backend untuk notifikasi Telegram
            await fetch('/api/notify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `🩸 KORBAN BARU TERSESAT!\n\nNama: ${username}\nStatus: Memasuki ruang gelap...` })
            });

            showChat();
        } else {
            errorMsg.style.display = 'block';
        }
    }

    function showChat() {
        loginModal.style.display = 'none';
        chatUi.style.display = 'flex';
        document.getElementById('user-display').innerText = `[ ${username} ]`;
        loadMessages();
        setInterval(loadMessages, 2000);
    }

    async function loadMessages() {
        if (!username) return;
        const res = await fetch(`/api/messages?user=${username}`);
        const data = await res.json();
        
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '';
        data.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender === username ? 'me' : 'admin'}`;
            div.innerHTML = `<div>${m.text}</div><div style="font-size:0.7em; margin-top:5px; opacity:0.5; text-align:right;">${m.timestamp}</div>`;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('chat-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        const text = input.value;
        if (!text) return;

        await fetch('/api/send', {
            method: 'POST',
            body: JSON.stringify({ sender: username, receiver: 'admin', text: text }),
            headers: { 'Content-Type': 'application/json' }
        });
        
        input.value = '';
        setTimeout(() => { input.focus(); loadMessages(); }, 100);
    });
</script>
</body>
</html>
